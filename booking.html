<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page</title>
    
     <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./CSS/bootstrap.min.css">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="./CSS/all.min.css">
    
    <!-- My Custom CSS file -->
    <link rel="stylesheet" href="./CSS/booking.css">

    <link rel="stylesheet" href="./CSS/dark_mode.css">
</head>
<body>

    <!--=================================== Main Section ======================-->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Complete Your Reservation</h2>
        
        <div class="row">
            
            <!-- Left Side: Room Details -->
            <div class="col-md-4">
                <div id="roomSummary" class="room-box p-3">
                    <p>Loading room details...</p>
                </div>
            </div>

            <!-- Right Side: Booking Form -->
            <div class="col-md-8">
                <div class="form-box p-4">
                    <h4>Guest Information</h4>
                    <hr>
                    
                    <form id="bookingForm">
                        <div class="row">
                            <!-- Name and Email -->
                            <div class="col-md-6 mb-3">
                                <label>Full Name:</label>
                                <input type="text" id="guestName" class="form-control" placeholder="Enter name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Email Address:</label>
                                <input type="email" id="guestEmail" class="form-control" placeholder="Enter email" required>
                            </div>

                            <!-- Phone and Number of Guests -->
                            <div class="col-md-6 mb-3">
                                <label>Phone Number:</label>
                                <input type="number" id="guestPhone" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Guests Count:</label>
                                <select id="guestsNum" class="form-select">
                                    <option value="1">1 Person</option>
                                    <option value="2">2 Persons</option>
                                    <option value="3">3 Persons</option>
                                    <option value="4">4 Persons</option>
                                    <option value="5">5 Persons</option>
                                    <option value="6">6 Persons</option>
                                </select>
                            </div>

                            <!--========== Check-in and Check-out Dates ================-->
                            <div class="col-md-6 mb-3">
                                <label>Check-in Date:</label>
                                <input type="date" id="checkIn" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Check-out Date:</label>
                                <input type="date" id="checkOut" class="form-control" required disabled>
                            </div>

                            <!-- Special Requests -->
                            <div class="col-12 mb-3">
                                <label>Special Requests:</label>
                                <textarea id="requests" class="form-control" rows="2"></textarea>
                            </div>

                            <!-- Buttons -->
                            <div class="col-12 mt-3">
                                <button type="submit" class="btn btn-warning w-100 fw-bold">Confirm Now</button>
                                <button type="reset" id="resetBtn" class="btn btn-outline-secondary w-100 mt-2">Clear Form</button>
                            </div>
                        </div>
                    </form>

                    <!-- Summary Result Shows after clicking Confirm -->
                    <div id="finalResult" class="result-box mt-4 d-none">
                        <!-- Total price and stay info will show here -->
                    </div>

                </div>
            </div> 

        </div> 
    </div> 


    <script src="./JS/bootstrap.bundle.min.js"></script>
    
    <script src="./JS/main.js"></script>
    
    <script src="./JS/booking.js"></script>
    
    
</body>
</html>
